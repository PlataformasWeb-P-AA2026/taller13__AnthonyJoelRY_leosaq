<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Nuevo Departamento</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Crear Nuevo Departamento</h1>

        <form method="POST">
            <div>
                <label for="propietario_completo">Nombre Completo del Propietario:</label>
                <input type="text" id="propietario_completo" name="propietario_completo" required>
            </div>
            <div>
                <label for="costo">Costo del Departamento:</label>
                <input type="number" step="0.01" id="costo" name="costo" required>
            </div>
            <div>
                <label for="cuartos_num">Número de Cuartos:</label>
                <input type="number" id="cuartos_num" name="cuartos_num" required>
            </div>
            <div>
                <label for="edificio">Edificio al que pertenece:</label>
                <select id="edificio" name="edificio" required>
                    {% if edificios %}
                        {# Se itera sobre la lista de edificios obtenida de la API de Django #}
                        {% for edificio in edificios %}
                            {# El 'value' envía la URL completa ya que la API espera un HyperlinkedRelatedField #}
                            <option value="{{ edificio.url }}">{{ edificio.nombre }} ({{ edificio.ciudad }})</option>
                        {% endfor %}
                    {% else %}
                        <option value="">No hay edificios disponibles</option>
                    {% endif %}
                </select>
            </div>
            <button type="submit">Crear Departamento</button>
        </form>

        <br>
        <a href="{{ url_for('los_departamentos') }}" class="back-link">Volver a la lista de departamentos</a>
    </div>
</body>
</html>
