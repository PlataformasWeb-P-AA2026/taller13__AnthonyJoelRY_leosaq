{% extends "master.html" %}

{% block title %}
  Edificio - Taller 13
{% endblock %}

{% block content %}

<section class="table-section">
  <h2>Información del edificio</h2>

  <table id="tabla_datos">
    <thead>
      <tr>
        <th>Edificio</th>
        <th>Dirección</th>
        <th>Ciudad</th>
        <th>Tipo</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>{{ edificio.nombre }}</td>
        <td>{{ edificio.direccion }}</td>
        <td>{{ edificio.ciudad }}</td>
        <td>
          <span class="yellow">{{ edificio.tipo }}</span>
        </td>
      </tr>
    </tbody>
  </table>

  <br>
  <a href="{% url 'listar_edificios' %}" class="yellow">Volver al listado</a>
</section>

{% endblock %}
